name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Use npm install (not npm ci) for parity with downstream consumer repos
      # that depend on this via github: protocol — their CI hits ours through
      # cross-org workflows, and ci's strict integrity hash check is brittle
      # against GitHub's tag-tarball regeneration.
      - run: npm install --no-audit --no-fund

      - run: npm run typecheck

      - run: npm test

      - run: npm run build
